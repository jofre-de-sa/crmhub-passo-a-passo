<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRM HUB — Entrar</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0b1428;
      --bg-mid:     #0f1e3a;
      --bg-card:    rgba(255,255,255,0.06);
      --border:     rgba(255,255,255,0.12);
      --accent:     #e02020;
      --accent2:    #c41212;
      --btn-blue:   #1a3a72;
      --btn-hover:  #1e4490;
      --text-light: #ccd6f0;
      --text-dim:   #7a90b8;
      --white:      #ffffff;
      --success:    #28e07a;
      --error:      #ff4d4d;
    }

    html, body { height: 100%; font-family: 'Barlow', sans-serif; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a3164 0%, var(--bg-deep) 70%);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      animation: bgShift 20s linear infinite;
    }
    @keyframes bgShift {
      from { background-position: 0 0; }
      to   { background-position: 36px 36px; }
    }

    .page {
      display: flex; flex-direction: column; align-items: center;
      gap: 28px; width: 100%; max-width: 480px; padding: 24px 16px;
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    .logo-box {
      border: 3px solid var(--accent);
      padding: 10px 18px; position: relative; background: transparent;
    }
    .logo-box::before, .logo-box::after {
      content: ''; position: absolute;
      width: 10px; height: 10px;
      border-color: var(--accent2); border-style: solid;
    }
    .logo-box::before { top: -4px; left: -4px; border-width: 3px 0 0 3px; }
    .logo-box::after  { bottom: -4px; right: -4px; border-width: 0 3px 3px 0; }

    .logo-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 2.6rem;
      letter-spacing: .04em; line-height: 1;
      color: var(--accent); text-align: center;
    }

    .logo-sub {
      font-size: .78rem; font-weight: 300;
      color: var(--text-light); text-align: center;
      line-height: 1.6; letter-spacing: .02em;
    }

    /* Card */
    .card {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 40px 36px 36px;
      display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 24px 60px rgba(0,0,0,.45);
    }

    .avatar {
      width: 68px; height: 68px; border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #2a4a8a, #162952);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
      box-shadow: 0 0 0 4px rgba(255,255,255,.07);
    }
    .avatar svg { width: 34px; height: 34px; opacity: .85; }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1.7rem;
      letter-spacing: .18em; color: var(--white);
      margin-bottom: 28px;
    }

    /* Form */
    .form { width: 100%; display: flex; flex-direction: column; gap: 6px; }
    .field { display: flex; flex-direction: column; gap: 4px; }

    .input-row {
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1.5px solid var(--border);
      padding: 8px 4px; transition: border-color .25s;
    }
    .input-row:focus-within { border-color: rgba(255,255,255,.5); }
    .input-row.error-state   { border-color: var(--error); }
    .input-row.success-state { border-color: var(--success); }
    .input-row svg { flex-shrink: 0; opacity: .65; }

    .input-row input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--white); font-family: 'Barlow', sans-serif;
      font-size: .95rem; font-weight: 400; letter-spacing: .04em;
    }
    .input-row input::placeholder { color: var(--text-dim); }

    .toggle-pw {
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); padding: 0; line-height: 1; transition: color .2s;
    }
    .toggle-pw:hover { color: var(--white); }

    .field-msg {
      font-size: .72rem; min-height: 16px;
      padding-left: 4px; transition: opacity .2s;
    }
    .field-msg.error   { color: var(--error); }
    .field-msg.success { color: var(--success); }

    .row-extras {
      display: flex; align-items: center; justify-content: space-between;
      margin: 14px 0 24px;
    }

    .remember {
      display: flex; align-items: center; gap: 7px;
      font-size: .8rem; color: var(--text-light); cursor: pointer;
    }
    .remember input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--btn-blue); cursor: pointer; }

    .forgot {
      font-size: .8rem; color: var(--text-light);
      text-decoration: underline; text-underline-offset: 3px;
      cursor: pointer; background: none; border: none; transition: color .2s;
    }
    .forgot:hover { color: var(--white); }

    /* Buttons */
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 50px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700; letter-spacing: .18em;
      cursor: pointer; transition: background .25s, transform .15s, box-shadow .25s;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,0); transition: background .2s;
    }
    .btn:hover::after { background: rgba(255,255,255,.06); }
    .btn:active { transform: scale(.98); }

    .btn-primary {
      background: var(--btn-blue); color: var(--white);
      margin-bottom: 12px;
      box-shadow: 0 6px 20px rgba(10,30,90,.5);
    }
    .btn-primary:hover { background: var(--btn-hover); box-shadow: 0 8px 28px rgba(10,30,90,.7); }
    .btn-secondary { background: #1c3e80; color: var(--white); }
    .btn-secondary:hover { background: #204690; }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .spinner {
      display: none; width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #152a55; border: 1px solid var(--border);
      color: var(--white); font-size: .85rem;
      padding: 12px 22px; border-radius: 8px;
      box-shadow: 0 8px 28px rgba(0,0,0,.5);
      transition: transform .4s cubic-bezier(.22,1,.36,1), opacity .4s;
      opacity: 0; white-space: nowrap; z-index: 999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.toast-success { border-color: var(--success); color: var(--success); }
    #toast.toast-error   { border-color: var(--error);   color: var(--error); }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); backdrop-filter: blur(6px);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }

    .modal {
      background: #0f1e3a; border: 1px solid var(--border);
      border-radius: 16px; padding: 36px 32px 28px;
      width: 90%; max-width: 400px;
      animation: fadeUp .35s ease both;
    }
    .modal h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1.4rem;
      letter-spacing: .15em; color: var(--white);
      margin-bottom: 22px; text-align: center;
    }
    .modal-close {
      float: right; margin-top: -28px;
      background: none; border: none;
      color: var(--text-dim); font-size: 1.3rem; cursor: pointer;
    }
    .modal-close:hover { color: var(--white); }

    @media (max-width: 460px) { .card { padding: 32px 22px 28px; } }
  </style>
</head>
<body>

<div class="page">
  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-box">
      <div class="logo-text">CRM<br>HUB</div>
    </div>
    <p class="logo-sub">Customer Relationship<br>Management Hub<br>By Plotting Engage.</p>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" fill="#6a8cc8"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" fill="#6a8cc8"/>
      </svg>
    </div>

    <h1 class="card-title">ENTRAR</h1>

    <div class="form" id="loginForm">
      <!-- Email -->
      <div class="field">
        <div class="input-row" id="rowEmail">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7a90b8" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
          </svg>
          <input type="text" id="email" placeholder="E-mail ou usuário" autocomplete="username"/>
        </div>
        <span class="field-msg" id="msgEmail"></span>
      </div>

      <!-- Senha -->
      <div class="field">
        <div class="input-row" id="rowSenha">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7a90b8" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="senha" placeholder="Senha" autocomplete="current-password"/>
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar senha">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="iconEye">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-msg" id="msgSenha"></span>
      </div>

      <!-- Extras -->
      <div class="row-extras">
        <label class="remember">
          <input type="checkbox" id="lembre" checked/> Lembre de mim
        </label>
        <button type="button" class="forgot" id="btnForgot">Esqueceu a sua senha</button>
      </div>

      <button class="btn btn-primary" id="btnEntrar">
        <span id="btnEntrarLabel">ENTRAR</span>
        <div class="spinner" id="spinnerEntrar"></div>
      </button>
      <button class="btn btn-secondary" id="btnCriar">CRIAR CONTA</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal Criar Conta -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2>CRIAR CONTA</h2>
    <div class="form" id="registerForm">
      <div class="field">
        <div class="input-row" id="rowNome">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7a90b8" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" id="nome" placeholder="Nome completo"/>
        </div>
        <span class="field-msg" id="msgNome"></span>
      </div>
      <div class="field">
        <div class="input-row" id="rowEmailReg">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7a90b8" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
          </svg>
          <input type="email" id="emailReg" placeholder="E-mail"/>
        </div>
        <span class="field-msg" id="msgEmailReg"></span>
      </div>
      <div class="field">
        <div class="input-row" id="rowSenhaReg">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7a90b8" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="senhaReg" placeholder="Senha (mín. 6 caracteres)"/>
        </div>
        <span class="field-msg" id="msgSenhaReg"></span>
      </div>
      <div style="margin-top:8px"></div>
      <button class="btn btn-primary" id="btnRegistrar">REGISTRAR</button>
    </div>
  </div>
</div>

<script>
  /* ── Supabase ── */
  const SUPABASE_URL = 'https://dqudfksdvyidimjjxpgq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_RhMLVVFehGzGn5HUYuzOLA_Zgsin-5U';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  /* ── Hash SHA-256 (senha nunca salva em texto puro) ── */
  async function sha256(text) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  /* ── Helpers UI ── */
  function setField(rowId, msgId, state, msg) {
    const row = document.getElementById(rowId);
    const el  = document.getElementById(msgId);
    row.classList.remove('error-state','success-state');
    el.classList.remove('error','success');
    el.textContent = '';
    if (state==='error')   { row.classList.add('error-state');   el.classList.add('error');   el.textContent=msg; }
    if (state==='success') { row.classList.add('success-state'); el.classList.add('success'); el.textContent=msg; }
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show toast-'+type;
    clearTimeout(t._t);
    t._t = setTimeout(()=>{ t.className=''; }, 3400);
  }

  function setBtnLoading(btnId, lblId, spnId, loading) {
    document.getElementById(btnId).disabled = loading;
    document.getElementById(lblId).style.display = loading ? 'none' : '';
    document.getElementById(spnId).style.display  = loading ? 'block' : 'none';
  }

  function isEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  /* ── Toggle senha ── */
  const togglePw = document.getElementById('togglePw');
  const senhaEl  = document.getElementById('senha');
  togglePw.addEventListener('click', () => {
    const show = senhaEl.type==='text';
    senhaEl.type = show ? 'password' : 'text';
    togglePw.innerHTML = show
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  });

  /* ── Validação live — Login ── */
  const emailEl = document.getElementById('email');
  emailEl.addEventListener('blur', ()=>{
    if (!emailEl.value.trim()) setField('rowEmail','msgEmail','error','Campo obrigatório.');
    else setField('rowEmail','msgEmail','success','');
  });
  emailEl.addEventListener('input', ()=>{ if(emailEl.value.trim()) setField('rowEmail','msgEmail','success',''); });

  senhaEl.addEventListener('blur', ()=>{
    const v = senhaEl.value;
    if (!v) setField('rowSenha','msgSenha','error','Campo obrigatório.');
    else if (v.length<4) setField('rowSenha','msgSenha','error','Mínimo de 4 caracteres.');
    else setField('rowSenha','msgSenha','success','');
  });
  senhaEl.addEventListener('input', ()=>{ if(senhaEl.value.length>=4) setField('rowSenha','msgSenha','success',''); });
  [emailEl, senhaEl].forEach(el => el.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('btnEntrar').click(); }));

  /* ── LOGIN — consulta tabela `login` no Supabase ── */
  document.getElementById('btnEntrar').addEventListener('click', async () => {
    const nomeVal  = emailEl.value.trim();
    const senhaVal = senhaEl.value;
    let ok = true;
    if (!nomeVal)  { setField('rowEmail','msgEmail','error','Informe seu usuário.'); ok=false; }
    if (!senhaVal) { setField('rowSenha','msgSenha','error','Informe sua senha.'); ok=false; }
    else if (senhaVal.length<4) { setField('rowSenha','msgSenha','error','Senha muito curta.'); ok=false; }
    if (!ok) return;

    setBtnLoading('btnEntrar','btnEntrarLabel','spinnerEntrar', true);
    try {
      const senhaHash = await sha256(senhaVal);
      const { data, error } = await db
        .from('login')
        .select('id, nome')
        .eq('nome', nomeVal)
        .eq('senha', senhaHash)
        .maybeSingle();

      if (error) throw error;

      if (data) {
        setField('rowEmail','msgEmail','success','');
        setField('rowSenha','msgSenha','success','');
        showToast(`✓ Bem-vindo, ${data.nome}!`, 'success');
        // Redirecionar após login: window.location.href = 'dashboard.html';
      } else {
        setField('rowSenha','msgSenha','error','Usuário ou senha incorretos.');
        showToast('Credenciais inválidas.','error');
      }
    } catch(e) {
      console.error(e);
      showToast('Erro de conexão. Verifique o console.','error');
    }
    setBtnLoading('btnEntrar','btnEntrarLabel','spinnerEntrar', false);
  });

  /* ── Esqueceu a senha ── */
  document.getElementById('btnForgot').addEventListener('click', ()=>{
    if (!emailEl.value.trim()) { setField('rowEmail','msgEmail','error','Informe o usuário para recuperação.'); return; }
    showToast('Link de recuperação enviado!','success');
  });

  /* ── Modal Criar Conta ── */
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('btnCriar').addEventListener('click',  ()=> overlay.classList.add('active'));
  document.getElementById('modalClose').addEventListener('click', ()=> overlay.classList.remove('active'));
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.classList.remove('active'); });

  /* ── Validação live — Registro ── */
  const nomeEl     = document.getElementById('nome');
  const emailRegEl = document.getElementById('emailReg');
  const senhaRegEl = document.getElementById('senhaReg');

  nomeEl.addEventListener('blur', ()=>{
    if (!nomeEl.value.trim()) setField('rowNome','msgNome','error','Informe seu nome.');
    else setField('rowNome','msgNome','success','');
  });
  emailRegEl.addEventListener('blur', ()=>{
    const v = emailRegEl.value.trim();
    if (!v) setField('rowEmailReg','msgEmailReg','error','Campo obrigatório.');
    else if (!isEmail(v)) setField('rowEmailReg','msgEmailReg','error','E-mail inválido.');
    else setField('rowEmailReg','msgEmailReg','success','');
  });
  senhaRegEl.addEventListener('blur', ()=>{
    const v = senhaRegEl.value;
    if (!v) setField('rowSenhaReg','msgSenhaReg','error','Campo obrigatório.');
    else if (v.length<6) setField('rowSenhaReg','msgSenhaReg','error','Mínimo 6 caracteres.');
    else setField('rowSenhaReg','msgSenhaReg','success','✓ Senha válida.');
  });
  senhaRegEl.addEventListener('input', ()=>{ if(senhaRegEl.value.length>=6) setField('rowSenhaReg','msgSenhaReg','success','✓ Senha válida.'); });

  /* ── CRIAR CONTA — insere na tabela `login` ── */
  document.getElementById('btnRegistrar').addEventListener('click', async () => {
    const nome  = nomeEl.value.trim();
    const email = emailRegEl.value.trim();
    const senha = senhaRegEl.value;
    let ok = true;

    if (!nome)  { setField('rowNome','msgNome','error','Informe seu nome.'); ok=false; }
    if (!email) { setField('rowEmailReg','msgEmailReg','error','Campo obrigatório.'); ok=false; }
    else if (!isEmail(email)) { setField('rowEmailReg','msgEmailReg','error','E-mail inválido.'); ok=false; }
    if (!senha) { setField('rowSenhaReg','msgSenhaReg','error','Campo obrigatório.'); ok=false; }
    else if (senha.length<6) { setField('rowSenhaReg','msgSenhaReg','error','Mínimo 6 caracteres.'); ok=false; }
    if (!ok) return;

    const btnReg = document.getElementById('btnRegistrar');
    btnReg.disabled = true;
    try {
      /* Verifica se usuário já existe */
      const { data: existe } = await db.from('login').select('id').eq('nome', nome).maybeSingle();
      if (existe) {
        setField('rowNome','msgNome','error','Este usuário já está cadastrado.');
        btnReg.disabled = false;
        return;
      }

      const senhaHash = await sha256(senha);
      const { error } = await db.from('login').insert([{ nome, senha: senhaHash }]);
      if (error) throw error;

      overlay.classList.remove('active');
      showToast('✓ Conta criada com sucesso!','success');
      nomeEl.value=''; emailRegEl.value=''; senhaRegEl.value='';
      [['rowNome','msgNome'],['rowEmailReg','msgEmailReg'],['rowSenhaReg','msgSenhaReg']]
        .forEach(([r,m])=> setField(r,m,'',''));
    } catch(e) {
      console.error(e);
      showToast('Erro ao criar conta. Tente novamente.','error');
    }
    btnReg.disabled = false;
  });
</script>
</body>
</html>
