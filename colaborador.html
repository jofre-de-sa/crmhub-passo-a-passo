<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRM HUB — Colaborador</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1f1a;
      --bg-mid:     #112318;
      --bg-card:    rgba(255,255,255,0.05);
      --accent:     #e02020;
      --green:      #1db877;
      --green-lt:   #25d68a;
      --green-dim:  rgba(29,184,119,.15);
      --white:      #ffffff;
      --text:       #b8d4c4;
      --text-dim:   #5a8070;
      --border:     rgba(255,255,255,0.07);
      --nav-h:      70px;
      --header-h:   72px;
    }

    html, body { height: 100%; font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--white); }

    /* subtle grid texture */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(29,184,119,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29,184,119,.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ══ HEADER ══ */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: var(--header-h);
      background: var(--bg-mid);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px 0 20px;
    }

    .logo-area { display: flex; align-items: center; gap: 14px; }
    .logo-box {
      border: 2.5px solid var(--accent);
      padding: 6px 10px; position: relative; flex-shrink: 0;
    }
    .logo-box::before, .logo-box::after {
      content: ''; position: absolute;
      width: 7px; height: 7px; border-color: #c41212; border-style: solid;
    }
    .logo-box::before { top: -3px; left: -3px; border-width: 2.5px 0 0 2.5px; }
    .logo-box::after  { bottom: -3px; right: -3px; border-width: 0 2.5px 2.5px 0; }
    .logo-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 1.4rem; line-height: 1;
      color: var(--accent); letter-spacing: .04em;
    }
    .logo-sub { font-size: .68rem; font-weight: 300; color: var(--text); line-height: 1.5; }

    /* ── User panel ── */
    .user-panel { display: flex; flex-direction: column; align-items: center; gap: 6px; }

    .user-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #1a5a3a, #0a2a1a);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 3px rgba(29,184,119,.35);
    }
    .user-avatar svg { width: 26px; height: 26px; }

    .user-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: .08em; color: var(--white); text-align: center;
    }

    .user-badges { display: flex; gap: 6px; }
    .badge {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .2s;
    }
    .badge:hover { background: var(--green-dim); }
    .badge svg { width: 12px; height: 12px; }

    .user-label {
      font-size: .68rem; color: var(--text-dim);
      letter-spacing: .06em; text-transform: uppercase;
    }

    /* ══ MAIN ══ */
    main {
      padding-top: calc(var(--header-h) + 28px);
      padding-bottom: calc(var(--nav-h) + 24px);
      padding-left: 28px; padding-right: 28px;
    }

    /* ── Welcome banner ── */
    .welcome-banner {
      background: linear-gradient(135deg, rgba(29,184,119,.18) 0%, rgba(29,184,119,.04) 100%);
      border: 1px solid rgba(29,184,119,.25);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 16px;
    }
    .welcome-icon {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--green-dim);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .welcome-icon svg { width: 22px; height: 22px; }
    .welcome-text h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.2rem; font-weight: 700;
      color: var(--green-lt); letter-spacing: .06em;
    }
    .welcome-text p { font-size: .8rem; color: var(--text); margin-top: 2px; }

    /* ── Section title ── */
    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--white); margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(29,184,119,.3), transparent);
    }

    /* ── Task cards ── */
    .tasks-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }

    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      transition: background .2s, transform .15s;
      cursor: pointer;
    }
    .task-card:hover { background: rgba(29,184,119,.07); transform: translateX(4px); }
    .task-card.done { border-left-color: var(--text-dim); opacity: .55; }
    .task-card.done .task-title { text-decoration: line-through; color: var(--text-dim); }

    .task-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--green);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .task-card.done .task-check { background: var(--green); border-color: var(--green); }
    .task-check svg { width: 11px; height: 11px; display: none; }
    .task-card.done .task-check svg { display: block; }

    .task-info { flex: 1; }
    .task-title { font-size: .9rem; font-weight: 500; color: var(--white); }
    .task-meta  { font-size: .72rem; color: var(--text-dim); margin-top: 2px; }

    .task-tag {
      font-size: .68rem; font-weight: 600;
      padding: 3px 9px; border-radius: 20px;
      background: var(--green-dim); color: var(--green-lt);
      letter-spacing: .04em;
    }
    .task-tag.urgent { background: rgba(224,32,32,.15); color: #ff6b6b; }
    .task-tag.pending { background: rgba(255,200,0,.12); color: #ffc800; }

    /* ── Stats row ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 12px;
      text-align: center;
    }
    .stat-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.8rem; font-weight: 800;
      color: var(--green-lt);
    }
    .stat-label { font-size: .68rem; color: var(--text-dim); margin-top: 2px; letter-spacing: .04em; }

    /* ── Add task button ── */
    .btn-add-task {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 13px 16px;
      background: var(--green-dim);
      border: 1px dashed rgba(29,184,119,.4);
      border-radius: 10px; color: var(--green-lt);
      font-family: 'Barlow', sans-serif; font-size: .88rem;
      cursor: pointer; transition: background .2s;
    }
    .btn-add-task:hover { background: rgba(29,184,119,.2); }

    /* ══ BOTTOM NAV ══ */
    nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--bg-mid);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      z-index: 50;
    }
    .nav-item {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer; padding: 8px 16px;
      color: var(--text-dim); transition: color .2s;
      background: none; border: none;
    }
    .nav-item:hover, .nav-item.active { color: var(--green-lt); }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-item span { font-size: .7rem; letter-spacing: .04em; }

    /* ══ MODALS ══ */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #112318; border: 1px solid rgba(29,184,119,.2);
      border-radius: 16px; padding: 32px 28px;
      width: 90%; max-width: 360px;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .modal h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem; font-weight: 700;
      letter-spacing: .12em; color: var(--white);
      margin-bottom: 20px; text-align: center;
    }
    .modal-close {
      float: right; margin-top: -26px;
      background: none; border: none;
      color: var(--text-dim); font-size: 1.2rem; cursor: pointer;
    }
    .modal-close:hover { color: var(--white); }

    .m-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .m-field label { font-size: .78rem; color: var(--text-dim); letter-spacing: .04em; }
    .m-field input, .m-field select {
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px; padding: 10px 12px;
      color: var(--white); font-family: 'Barlow', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .2s;
    }
    .m-field input:focus, .m-field select:focus { border-color: var(--green); }
    .m-field input::placeholder { color: var(--text-dim); }
    .m-field select option { background: #112318; }

    .btn-save {
      width: 100%; padding: 12px;
      background: var(--green); border: none; border-radius: 50px;
      color: var(--white); font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700; letter-spacing: .14em;
      cursor: pointer; margin-top: 6px; transition: background .2s;
    }
    .btn-save:hover { background: var(--green-lt); }

    .btn-logout {
      width: 100%; padding: 10px;
      background: transparent; border: 1px solid rgba(224,32,32,.4);
      border-radius: 50px; color: #e02020;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .9rem; font-weight: 600; letter-spacing: .12em;
      cursor: pointer; margin-top: 10px; transition: background .2s;
    }
    .btn-logout:hover { background: rgba(224,32,32,.12); }

    /* Toast */
    #toast {
      position: fixed; top: 90px; left: 50%;
      transform: translateX(-50%) translateY(-60px);
      background: #0d2a1a; border: 1px solid rgba(255,255,255,.12);
      color: var(--white); font-size: .85rem;
      padding: 10px 20px; border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      transition: transform .35s cubic-bezier(.22,1,.36,1), opacity .35s;
      opacity: 0; white-space: nowrap; z-index: 200;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.toast-success { border-color: var(--green); color: var(--green-lt); }
    #toast.toast-error   { border-color: #ff4d4d; color: #ff4d4d; }

    @media (max-width: 480px) {
      main { padding-left: 16px; padding-right: 16px; }
      .stats-row { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-area">
    <div class="logo-box">
      <div class="logo-text">CRM<br>HUB</div>
    </div>
    <div class="logo-sub">Customer Relationship<br>Management Hub<br>By Plotting Engage.</div>
  </div>

  <div class="user-panel">
    <div class="user-avatar">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" fill="#1db877"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" fill="#1db877"/>
      </svg>
    </div>
    <div class="user-name" id="userNameDisplay">—</div>
    <div class="user-badges">
      <div class="badge" title="Notificações">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
      <div class="badge" title="Mensagens">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="badge" title="Sair" id="btnLogout">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
    </div>
    <div class="user-label">Colaborador</div>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- Welcome -->
  <div class="welcome-banner">
    <div class="welcome-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--green-lt)" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </div>
    <div class="welcome-text">
      <h2 id="welcomeMsg">Bem-vindo!</h2>
      <p id="welcomeSub">Veja as suas tarefas do dia</p>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="statTotal">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statPendente" style="color:#ffc800">0</div>
      <div class="stat-label">Pendentes</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statConcluido">0</div>
      <div class="stat-label">Concluídas</div>
    </div>
  </div>

  <!-- Tasks -->
  <div class="section-title">Minhas Tarefas</div>
  <div class="tasks-list" id="tasksList">
    <!-- tarefas injectadas por JS -->
  </div>

  <button class="btn-add-task" id="btnAddTask">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    Adicionar nova tarefa
  </button>

</main>

<!-- BOTTOM NAV -->
<nav>
  <button class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Home</span>
  </button>
  <button class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
    </svg>
    <span>Tarefas</span>
  </button>
  <button class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    <span>Definições</span>
  </button>
  <button class="nav-item" id="navMyAccount">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Conta</span>
  </button>
</nav>

<!-- Modal Nova Tarefa -->
<div class="modal-overlay" id="modalTask">
  <div class="modal">
    <button class="modal-close" id="modalTaskClose">✕</button>
    <h3>NOVA TAREFA</h3>
    <div class="m-field">
      <label>Descrição da tarefa</label>
      <input type="text" id="taskDesc" placeholder="O que precisa ser feito?"/>
    </div>
    <div class="m-field">
      <label>Projecto</label>
      <input type="text" id="taskProj" placeholder="Ex: FIB, Projecto Alpha..."/>
    </div>
    <div class="m-field">
      <label>Prioridade</label>
      <select id="taskPrio">
        <option value="normal">Normal</option>
        <option value="urgente">Urgente</option>
        <option value="pendente">Pendente</option>
      </select>
    </div>
    <button class="btn-save" id="btnSaveTask">ADICIONAR</button>
  </div>
</div>

<!-- Modal Minha Conta -->
<div class="modal-overlay" id="modalAccount">
  <div class="modal">
    <button class="modal-close" id="modalAccClose">✕</button>
    <h3>MINHA CONTA</h3>
    <div style="text-align:center; padding: 10px 0 20px;">
      <div class="user-avatar" style="margin: 0 auto 12px; width:56px; height:56px;">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" fill="#1db877"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" fill="#1db877"/>
        </svg>
      </div>
      <div style="font-size:1.1rem; font-weight:600; color:#fff;" id="accNome">—</div>
      <div style="font-size:.8rem; color: var(--text-dim); margin-top:4px; text-transform:capitalize;" id="accTipo">Colaborador</div>
    </div>
    <button class="btn-logout" id="btnLogoutConfirm">SAIR DA CONTA</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  /* ── Sessão ── */
  const session = JSON.parse(localStorage.getItem('crm_user') || 'null');

  if (!session) {
    window.location.href = 'index.html';
  } else {
    document.getElementById('userNameDisplay').textContent = session.nome;
    document.getElementById('welcomeMsg').textContent  = `Olá, ${session.nome}!`;
    document.getElementById('welcomeSub').textContent  = 'Veja as suas tarefas do dia';
    document.getElementById('accNome').textContent     = session.nome;
    document.getElementById('accTipo').textContent     = session.tipo;
  }

  /* ── Toast ── */
  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show toast-'+type;
    clearTimeout(t._t);
    t._t = setTimeout(()=>{ t.className=''; }, 3000);
  }

  /* ── Tarefas (em memória por sessão) ── */
  let tasks = [
    { id:1, title:'Actualizar relatório mensal', proj:'FIB', prio:'normal',   done:false },
    { id:2, title:'Enviar proposta ao cliente',  proj:'FIB', prio:'urgente',  done:false },
    { id:3, title:'Reunião de equipa — 15h',     proj:'Geral', prio:'pendente', done:false },
  ];

  function renderTasks() {
    const list = document.getElementById('tasksList');
    list.innerHTML = '';
    tasks.forEach(t => {
      const tagClass = t.prio === 'urgente' ? 'urgent' : t.prio === 'pendente' ? 'pending' : '';
      const div = document.createElement('div');
      div.className = 'task-card' + (t.done ? ' done' : '');
      div.dataset.id = t.id;
      div.innerHTML = `
        <div class="task-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="task-info">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">${t.proj}</div>
        </div>
        ${t.prio !== 'normal' ? `<span class="task-tag ${tagClass}">${t.prio}</span>` : ''}`;
      div.addEventListener('click', () => toggleTask(t.id));
      list.appendChild(div);
    });
    updateStats();
  }

  function toggleTask(id) {
    const t = tasks.find(x => x.id === id);
    if (t) {
      t.done = !t.done;
      renderTasks();
      showToast(t.done ? '✓ Tarefa concluída!' : 'Tarefa reaberta.', t.done ? 'success' : '');
    }
  }

  function updateStats() {
    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;
    const pend  = total - done;
    document.getElementById('statTotal').textContent     = total;
    document.getElementById('statPendente').textContent  = pend;
    document.getElementById('statConcluido').textContent = done;
  }

  renderTasks();

  /* ── Modal Nova Tarefa ── */
  const modalTask = document.getElementById('modalTask');
  document.getElementById('btnAddTask').addEventListener('click', () => modalTask.classList.add('active'));
  document.getElementById('modalTaskClose').addEventListener('click', () => modalTask.classList.remove('active'));
  modalTask.addEventListener('click', e => { if(e.target===modalTask) modalTask.classList.remove('active'); });

  document.getElementById('btnSaveTask').addEventListener('click', () => {
    const desc = document.getElementById('taskDesc').value.trim();
    const proj = document.getElementById('taskProj').value.trim() || 'Geral';
    const prio = document.getElementById('taskPrio').value;
    if (!desc) { document.getElementById('taskDesc').style.borderColor='#ff4d4d'; return; }

    tasks.push({ id: Date.now(), title: desc, proj, prio, done: false });
    renderTasks();
    document.getElementById('taskDesc').value = '';
    document.getElementById('taskProj').value = '';
    document.getElementById('taskPrio').value = 'normal';
    modalTask.classList.remove('active');
    showToast('✓ Tarefa adicionada!', 'success');
  });

  /* ── Nav active ── */
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  /* ── Modal Minha Conta ── */
  const modalAcc = document.getElementById('modalAccount');
  document.getElementById('navMyAccount').addEventListener('click', () => modalAcc.classList.add('active'));
  document.getElementById('modalAccClose').addEventListener('click', () => modalAcc.classList.remove('active'));
  modalAcc.addEventListener('click', e => { if(e.target===modalAcc) modalAcc.classList.remove('active'); });

  /* ── Logout ── */
  function doLogout() {
    localStorage.removeItem('crm_user');
    window.location.href = 'index.html';
  }
  document.getElementById('btnLogout').addEventListener('click', doLogout);
  document.getElementById('btnLogoutConfirm').addEventListener('click', doLogout);
</script>
</body>
</html>
