<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CRM HUB — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b1428;
      --bg-mid:    #0f1e3a;
      --bg-card:   #eef1fa;
      --accent:    #e02020;
      --purple:    #6c3fc5;
      --purple-lt: #7c4fd5;
      --white:     #ffffff;
      --text:      #ccd6f0;
      --text-dim:  #6a7fa8;
      --border:    rgba(255,255,255,0.08);
      --nav-h:     70px;
      --header-h:  116px;
    }

    html, body { height: 100%; font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--white); }

    /* ══ HEADER ══ */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: var(--header-h);
      background: var(--bg-mid);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px 0 20px;
    }

    .logo-area { display: flex; align-items: center; gap: 14px; }

    .logo-box {
      border: 2.5px solid var(--accent);
      padding: 6px 10px; position: relative; flex-shrink: 0;
    }
    .logo-box::before, .logo-box::after {
      content: ''; position: absolute;
      width: 7px; height: 7px; border-color: #c41212; border-style: solid;
    }
    .logo-box::before { top: -3px; left: -3px; border-width: 2.5px 0 0 2.5px; }
    .logo-box::after  { bottom: -3px; right: -3px; border-width: 0 2.5px 2.5px 0; }

    .logo-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 1.4rem; line-height: 1;
      color: var(--accent); letter-spacing: .04em;
    }

    .logo-sub { font-size: .68rem; font-weight: 300; color: var(--text); line-height: 1.5; }

    /* ── User panel ── */
    .user-panel {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 5px; height: 100%;
    }

    .user-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #4a3a9a, #2a1a6a);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 3px rgba(108,63,197,.4);
      flex-shrink: 0;
    }
    .user-avatar svg { width: 24px; height: 24px; }

    .user-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .95rem; font-weight: 700;
      letter-spacing: .08em; color: var(--white);
      text-align: center; line-height: 1;
    }

    .user-badges { display: flex; gap: 6px; }
    .badge {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--purple);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .2s;
    }
    .badge:hover { background: rgba(108,63,197,.3); }
    .badge svg { width: 12px; height: 12px; }

    .user-label {
      font-size: .65rem; color: var(--text-dim);
      letter-spacing: .06em; text-transform: uppercase;
      line-height: 1;
    }

    /* ══ MAIN ══ */
    main {
      padding-top: calc(var(--header-h) + 32px);
      padding-bottom: calc(var(--nav-h) + 24px);
      padding-left: 32px; padding-right: 32px;
      min-height: 100vh;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem; font-weight: 700;
      color: var(--white); margin-bottom: 24px;
    }

    /* ── Project grid ── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 220px));
      gap: 20px;
    }

    .project-card {
      background: var(--bg-card);
      border-radius: 18px;
      aspect-ratio: 1 / 1.1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      overflow: hidden;
    }
    .project-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.35); }

    /* filled card content */
    .project-card .card-content {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      padding: 16px; text-align: center; color: #1a2a4a;
    }
    .project-card .card-icon { font-size: 1.8rem; }
    .project-card .card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1.1rem;
      color: var(--purple); letter-spacing: .04em;
    }
    .project-card .card-sub { font-size: .72rem; color: #4a5a7a; }

    /* add button */
    .btn-add {
      position: absolute; bottom: 12px; right: 12px;
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--purple); border: none;
      color: var(--white); font-size: 1.3rem; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(108,63,197,.5);
      transition: background .2s, transform .15s;
    }
    .btn-add:hover { background: var(--purple-lt); transform: scale(1.1); }

    /* empty card */
    .project-card.empty { background: rgba(255,255,255,.06); border: 1.5px dashed rgba(255,255,255,.12); }

    /* ══ BOTTOM NAV ══ */
    nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--bg-mid);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      z-index: 50;
    }

    .nav-item {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer; padding: 8px 16px;
      color: var(--text-dim); transition: color .2s;
      background: none; border: none;
    }
    .nav-item:hover, .nav-item.active { color: var(--white); }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-item span { font-size: .7rem; letter-spacing: .04em; }

    /* ══ MODAL Novo Projeto ══ */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); backdrop-filter: blur(6px);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #0f1e3a; border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px; padding: 32px 28px;
      width: 90%; max-width: 360px;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .modal h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem; font-weight: 700;
      letter-spacing: .12em; color: var(--white);
      margin-bottom: 20px; text-align: center;
    }
    .modal-close {
      float: right; margin-top: -26px;
      background: none; border: none;
      color: var(--text-dim); font-size: 1.2rem; cursor: pointer;
    }
    .modal-close:hover { color: var(--white); }

    .m-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .m-field label { font-size: .78rem; color: var(--text-dim); letter-spacing: .04em; }
    .m-field input {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px; padding: 10px 12px;
      color: var(--white); font-family: 'Barlow', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .2s;
    }
    .m-field input:focus { border-color: var(--purple); }
    .m-field input::placeholder { color: var(--text-dim); }

    .btn-save {
      width: 100%; padding: 12px;
      background: var(--purple); border: none; border-radius: 50px;
      color: var(--white); font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem; font-weight: 700; letter-spacing: .14em;
      cursor: pointer; margin-top: 6px; transition: background .2s;
    }
    .btn-save:hover { background: var(--purple-lt); }

    /* ══ LOGOUT confirm ══ */
    .btn-logout {
      width: 100%; padding: 10px;
      background: transparent; border: 1px solid rgba(224,32,32,.4);
      border-radius: 50px; color: #e02020;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .9rem; font-weight: 600; letter-spacing: .12em;
      cursor: pointer; margin-top: 10px; transition: background .2s;
    }
    .btn-logout:hover { background: rgba(224,32,32,.12); }

    /* Toast */
    #toast {
      position: fixed; top: 90px; left: 50%;
      transform: translateX(-50%) translateY(-60px);
      background: #152a55; border: 1px solid rgba(255,255,255,.12);
      color: var(--white); font-size: .85rem;
      padding: 10px 20px; border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      transition: transform .35s cubic-bezier(.22,1,.36,1), opacity .35s;
      opacity: 0; white-space: nowrap; z-index: 200;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.toast-success { border-color: #28e07a; color: #28e07a; }
    #toast.toast-error   { border-color: #ff4d4d; color: #ff4d4d; }

    @media (max-width: 480px) {
      main { padding-left: 16px; padding-right: 16px; }
      .projects-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-area">
    <div class="logo-box">
      <div class="logo-text">CRM<br>HUB</div>
    </div>
    <div class="logo-sub">Customer Relationship<br>Management Hub<br>By Plotting Engage.</div>
  </div>

  <div class="user-panel">
    <div class="user-avatar">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" fill="#f0c040"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" fill="#f0c040"/>
      </svg>
    </div>
    <div class="user-name" id="userNameDisplay">—</div>
    <div class="user-badges">
      <div class="badge" title="Notificações">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </div>
      <div class="badge" title="Mensagens">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="badge" title="Sair" id="btnLogout">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
    </div>
    <div class="user-label" id="userTipoDisplay">Administrador</div>
  </div>
</header>

<!-- MAIN -->
<main>
  <div class="section-title">Projectos</div>

  <div class="projects-grid" id="projectsGrid">
    <!-- Projeto exemplo já existente -->
    <div class="project-card">
      <div class="card-content">
        <div class="card-icon">🌐</div>
        <div class="card-name">FIB</div>
        <div class="card-sub">Feira Int. Benguela</div>
      </div>
      <button class="btn-add" title="Ver projecto">+</button>
    </div>

    <!-- Slots vazios -->
    <div class="project-card empty">
      <button class="btn-add" id="btnAddProj1" title="Novo projecto">+</button>
    </div>
    <div class="project-card empty">
      <button class="btn-add" id="btnAddProj2" title="Novo projecto">+</button>
    </div>
  </div>
</main>

<!-- BOTTOM NAV -->
<nav>
  <button class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Home</span>
  </button>
  <button class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
      <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
    </svg>
    <span>My List</span>
  </button>
  <button class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    <span>Setting</span>
  </button>
  <button class="nav-item" id="navMyAccount">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
    <span>My Account</span>
  </button>
</nav>

<!-- Modal Novo Projecto -->
<div class="modal-overlay" id="modalProj">
  <div class="modal">
    <button class="modal-close" id="modalProjClose">✕</button>
    <h3>NOVO PROJECTO</h3>
    <div class="m-field">
      <label>Nome do projecto</label>
      <input type="text" id="projNome" placeholder="Ex: Projecto Alpha"/>
    </div>
    <div class="m-field">
      <label>Descrição</label>
      <input type="text" id="projDesc" placeholder="Breve descrição"/>
    </div>
    <button class="btn-save" id="btnSaveProj">ADICIONAR</button>
  </div>
</div>

<!-- Modal My Account -->
<div class="modal-overlay" id="modalAccount">
  <div class="modal">
    <button class="modal-close" id="modalAccClose">✕</button>
    <h3>MINHA CONTA</h3>
    <div style="text-align:center; padding: 10px 0 20px;">
      <div class="user-avatar" style="margin: 0 auto 12px;">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" fill="#f0c040"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" fill="#f0c040"/>
        </svg>
      </div>
      <div style="font-size:1.1rem; font-weight:600; color:#fff;" id="accNome">—</div>
      <div style="font-size:.8rem; color: var(--text-dim); margin-top:4px; text-transform:capitalize;" id="accTipo">—</div>
    </div>
    <button class="btn-logout" id="btnLogoutConfirm">SAIR DA CONTA</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  /* ── Sessão ── */
  const session = JSON.parse(localStorage.getItem('crm_user') || 'null');

  if (!session) {
    /* Sem sessão → volta para o login */
    window.location.href = 'index.html';
  } else {
    /* Exibe nome e tipo no header */
    document.getElementById('userNameDisplay').textContent = session.nome;
    document.getElementById('userTipoDisplay').textContent =
      session.tipo.charAt(0).toUpperCase() + session.tipo.slice(1);

    /* Modal Minha Conta */
    document.getElementById('accNome').textContent = session.nome;
    document.getElementById('accTipo').textContent = session.tipo;
  }

  /* ── Toast ── */
  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show toast-'+type;
    clearTimeout(t._t);
    t._t = setTimeout(()=>{ t.className=''; }, 3000);
  }

  /* ── Nav active ── */
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  /* ── Modal Novo Projecto ── */
  const modalProj = document.getElementById('modalProj');
  document.getElementById('btnAddProj1').addEventListener('click', () => modalProj.classList.add('active'));
  document.getElementById('btnAddProj2').addEventListener('click', () => modalProj.classList.add('active'));
  document.getElementById('modalProjClose').addEventListener('click', () => modalProj.classList.remove('active'));
  modalProj.addEventListener('click', e => { if(e.target===modalProj) modalProj.classList.remove('active'); });

  document.getElementById('btnSaveProj').addEventListener('click', () => {
    const nome = document.getElementById('projNome').value.trim();
    const desc = document.getElementById('projDesc').value.trim();
    if (!nome) { document.getElementById('projNome').style.borderColor='#ff4d4d'; return; }

    /* Adiciona novo card antes dos slots vazios */
    const grid = document.getElementById('projectsGrid');
    const emptyCards = grid.querySelectorAll('.project-card.empty');
    const newCard = document.createElement('div');
    newCard.className = 'project-card';
    newCard.innerHTML = `
      <div class="card-content">
        <div class="card-icon">📁</div>
        <div class="card-name">${nome.substring(0,10)}</div>
        <div class="card-sub">${desc.substring(0,24)}</div>
      </div>
      <button class="btn-add">+</button>`;
    grid.insertBefore(newCard, emptyCards[0] || null);

    document.getElementById('projNome').value = '';
    document.getElementById('projDesc').value = '';
    modalProj.classList.remove('active');
    showToast('✓ Projecto adicionado!', 'success');
  });

  /* ── My Account → página própria ── */
  document.getElementById('navMyAccount').addEventListener('click', () => {
    window.location.href = 'minhaconta.html';
  });

  /* ── Logout ── */
  function doLogout() {
    localStorage.removeItem('crm_user');
    window.location.href = 'index.html';
  }
  document.getElementById('btnLogout').addEventListener('click', doLogout);
</script>
</body>
</html>
